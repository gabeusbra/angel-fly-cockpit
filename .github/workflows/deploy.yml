name: Deploy to Hostinger FTP

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_FTP_SERVER: ${{ secrets.FTP_SERVER || secrets.HOSTINGER_FTP_SERVER || secrets.HOSTINGER_SERVER || secrets.FTP_HOST || secrets.HOSTINGER_HOST || secrets.SERVER }}
      DEPLOY_FTP_USERNAME: ${{ secrets.FTP_USERNAME || secrets.HOSTINGER_FTP_USERNAME || secrets.HOSTINGER_USERNAME || secrets.FTP_USER || secrets.HOSTINGER_USER || secrets.USERNAME }}
      DEPLOY_FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.HOSTINGER_FTP_PASSWORD || secrets.HOSTINGER_PASSWORD || secrets.FTP_PASS || secrets.HOSTINGER_PASS || secrets.PASSWORD }}
      DEPLOY_FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR || secrets.HOSTINGER_TARGET_DIR || secrets.FTP_SERVER_DIR || secrets.DEPLOY_PATH || 'public_html' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Validate FTP credentials
        run: |
          if [ -z "$DEPLOY_FTP_SERVER" ] || [ -z "$DEPLOY_FTP_USERNAME" ] || [ -z "$DEPLOY_FTP_PASSWORD" ]; then
            echo "::error title=Missing FTP secrets::Set FTP_SERVER/FTP_USERNAME/FTP_PASSWORD (or one of the alias names in deploy.yml)."
            exit 1
          fi

      - name: Normalize FTP host/port
        id: ftp_target
        shell: bash
        run: |
          raw="$DEPLOY_FTP_SERVER"
          raw="${raw//$'\r'/}"
          raw="${raw//$'\n'/}"
          raw="${raw#"${raw%%[![:space:]]*}"}"
          raw="${raw%"${raw##*[![:space:]]}"}"
          raw="${raw#ftp://}"
          raw="${raw#ftps://}"
          raw="${raw%%/*}"
          raw="${raw%\"}"
          raw="${raw#\"}"
          raw="${raw%\'}"
          raw="${raw#\'}"

          host="$raw"
          port="21"

          if [[ "$raw" =~ ^\[([0-9a-fA-F:]+)\]:(.+)$ ]]; then
            host="${BASH_REMATCH[1]}"
            port="${BASH_REMATCH[2]}"
          elif [[ "$raw" == *:* ]]; then
            maybe_port="${raw##*:}"
            if [[ "$maybe_port" =~ ^[0-9]+$ ]]; then
              host="${raw%:*}"
              port="$maybe_port"
            fi
          fi

          if [ -z "$host" ]; then
            echo "::error title=Invalid FTP_SERVER::Could not parse FTP host from secret value."
            exit 1
          fi

          echo "server=$host" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Normalize FTP target directory
        id: ftp_dir
        shell: bash
        run: |
          raw="$DEPLOY_FTP_TARGET_DIR"
          raw="${raw//$'\r'/}"
          raw="${raw//$'\n'/}"
          raw="${raw#"${raw%%[![:space:]]*}"}"
          raw="${raw%"${raw##*[![:space:]]}"}"
          raw="${raw%\"}"
          raw="${raw#\"}"
          raw="${raw%\'}"
          raw="${raw#\'}"

          [ -z "$raw" ] && raw="public_html"

          if [ "$raw" = "." ] || [ "$raw" = "./" ] || [ "$raw" = "/" ]; then
            dist_dir="./"
            api_dir="./api/"
          else
            raw="${raw#./}"
            raw="${raw#/}"
            raw="${raw%/}"
            dist_dir="./$raw/"
            api_dir="./$raw/api/"
          fi

          echo "dist_dir=$dist_dir" >> "$GITHUB_OUTPUT"
          echo "api_dir=$api_dir" >> "$GITHUB_OUTPUT"
          echo "Deploy target dist dir: $dist_dir"
          echo "Deploy target api dir: $api_dir"

      - name: Validate FTP DNS (skip when IP is used)
        shell: bash
        run: |
          host="${{ steps.ftp_target.outputs.server }}"
          is_ipv4='^([0-9]{1,3}\.){3}[0-9]{1,3}$'
          is_ipv6='^[0-9a-fA-F:]+$'

          if [[ "$host" =~ $is_ipv4 ]] || [[ "$host" =~ $is_ipv6 ]]; then
            echo "Using FTP IP host: $host"
            exit 0
          fi

          if ! getent ahosts "$host" >/dev/null 2>&1; then
            echo "::error title=FTP host DNS failed::Host '$host' could not be resolved. Check FTP_SERVER secret value."
            exit 1
          fi

      - name: Upload frontend dist to FTP root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp_target.outputs.server }}
          port: ${{ steps.ftp_target.outputs.port }}
          username: ${{ env.DEPLOY_FTP_USERNAME }}
          password: ${{ env.DEPLOY_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ steps.ftp_dir.outputs.dist_dir }}
          timeout: 120000

      - name: Upload PHP API to /api
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp_target.outputs.server }}
          port: ${{ steps.ftp_target.outputs.port }}
          username: ${{ env.DEPLOY_FTP_USERNAME }}
          password: ${{ env.DEPLOY_FTP_PASSWORD }}
          local-dir: ./public/api/
          server-dir: ${{ steps.ftp_dir.outputs.api_dir }}
          timeout: 120000

      # Fallback to root in case FTP user is already chrooted at public_html.
      - name: Fallback upload frontend dist to FTP root
        if: ${{ steps.ftp_dir.outputs.dist_dir != './' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp_target.outputs.server }}
          port: ${{ steps.ftp_target.outputs.port }}
          username: ${{ env.DEPLOY_FTP_USERNAME }}
          password: ${{ env.DEPLOY_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          timeout: 120000

      - name: Fallback upload PHP API to root /api
        if: ${{ steps.ftp_dir.outputs.api_dir != './api/' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp_target.outputs.server }}
          port: ${{ steps.ftp_target.outputs.port }}
          username: ${{ env.DEPLOY_FTP_USERNAME }}
          password: ${{ env.DEPLOY_FTP_PASSWORD }}
          local-dir: ./public/api/
          server-dir: ./api/
          timeout: 120000
