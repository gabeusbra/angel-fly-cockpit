name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_FTP_SERVER: ${{ secrets.FTP_SERVER || secrets.HOSTINGER_FTP_SERVER || secrets.HOSTINGER_SERVER || secrets.FTP_HOST || secrets.HOSTINGER_HOST || secrets.SERVER }}
      DEPLOY_FTP_USERNAME: ${{ secrets.FTP_USERNAME || secrets.HOSTINGER_FTP_USERNAME || secrets.HOSTINGER_USERNAME || secrets.FTP_USER || secrets.HOSTINGER_USER || secrets.USERNAME }}
      DEPLOY_FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.HOSTINGER_FTP_PASSWORD || secrets.HOSTINGER_PASSWORD || secrets.FTP_PASS || secrets.HOSTINGER_PASS || secrets.PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Project
        run: npm run build

      - name: Validate FTP credentials
        run: |
          if [ -z "$DEPLOY_FTP_SERVER" ] || [ -z "$DEPLOY_FTP_USERNAME" ] || [ -z "$DEPLOY_FTP_PASSWORD" ]; then
            echo "::error title=Missing FTP secrets::Set FTP_SERVER/FTP_USERNAME/FTP_PASSWORD (or one of the HOSTINGER/FTP alias names used in deploy.yml)."
            exit 1
          fi

      - name: Normalize FTP host/port
        id: ftp_target
        shell: bash
        run: |
          raw="$DEPLOY_FTP_SERVER"
          raw="${raw//$'\r'/}"
          raw="${raw//$'\n'/}"
          raw="${raw#"${raw%%[![:space:]]*}"}"
          raw="${raw%"${raw##*[![:space:]]}"}"
          raw="${raw#ftp://}"
          raw="${raw#ftps://}"
          raw="${raw#sftp://}"
          raw="${raw%%/*}"

          host="$raw"
          port="21"

          if [[ "$raw" =~ ^\[([0-9a-fA-F:]+)\]:(.+)$ ]]; then
            host="${BASH_REMATCH[1]}"
            port="${BASH_REMATCH[2]}"
          elif [[ "$raw" == *:* ]]; then
            maybe_port="${raw##*:}"
            if [[ "$maybe_port" =~ ^[0-9]+$ ]]; then
              host="${raw%:*}"
              port="$maybe_port"
            fi
          fi

          if [ -z "$host" ]; then
            echo "::error title=Invalid FTP_SERVER::Could not parse FTP host from secret value."
            exit 1
          fi

          echo "server=$host" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Validate FTP DNS
        shell: bash
        run: |
          host="${{ steps.ftp_target.outputs.server }}"
          if ! getent hosts "$host" >/dev/null 2>&1; then
            echo "::error title=FTP host DNS failed::Host '$host' could not be resolved. Check FTP_SERVER secret value."
            exit 1
          fi

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ steps.ftp_target.outputs.server }}
          port: ${{ steps.ftp_target.outputs.port }}
          username: ${{ env.DEPLOY_FTP_USERNAME }}
          password: ${{ env.DEPLOY_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          timeout: 100000

      - name: Upload API (PHP) to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ steps.ftp_target.outputs.server }}
          port: ${{ steps.ftp_target.outputs.port }}
          username: ${{ env.DEPLOY_FTP_USERNAME }}
          password: ${{ env.DEPLOY_FTP_PASSWORD }}
          local-dir: ./public/api/
          server-dir: ./api/
          timeout: 100000
